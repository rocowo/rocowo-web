<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoCoWo</title>
<meta name="description" content="Building the future, one idea at a time.">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0D0D0D;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 40px 24px;
  }
  .logo { width: min(420px, 85vw); margin-bottom: 32px; }
  .tagline {
    font-size: 1rem;
    font-weight: 300;
    color: #555;
    letter-spacing: 0.1em;
    margin-bottom: 48px;
  }
  .tagline span { color: #7c6dfa; }
  .cta {
    display: inline-block;
    padding: 12px 32px;
    border: 1px solid #2a2a3e;
    border-radius: 40px;
    color: #aaa;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    text-decoration: none;
    transition: all 0.2s;
  }
  .cta:hover { border-color: #7c6dfa; color: #fff; }
  .links {
    display: flex;
    gap: 24px;
    margin-top: 48px;
  }
  .links a {
    color: #333;
    font-size: 0.75rem;
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }
  .links a:hover { color: #7c6dfa; }
  .footer {
    position: fixed;
    bottom: 24px;
    font-size: 0.7rem;
    color: #222;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

  <img src="/assets/logo.png" alt="RoCoWo" class="logo">

  <p class="tagline">Building the future, <span>one idea at a time.</span></p>

  <a href="mailto:info@rocowo.com" class="cta">Get in touch</a>

  <div class="links">
    <a href="https://x.com/RoCoWoHQ" target="_blank">X / Twitter</a>
    <a href="mailto:info@rocowo.com">info@rocowo.com</a>
  </div>

  <p class="footer">© 2026 RoCoWo. All rights reserved.</p>

</body>
</html>
