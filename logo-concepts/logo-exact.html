<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RoCoWo Logo</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #222; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 48px; padding: 48px; }
  .label { color: #555; font-family: sans-serif; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; }
  svg { display: block; }
</style>
</head>
<body>

<div class="label">Dark</div>
<svg width="670" height="670" viewBox="0 0 670 670" xmlns="http://www.w3.org/2000/svg">
  <rect width="670" height="670" fill="#0D0D0D"/>
  <!-- Concentric diamonds centered at 335,280 -->
  <!-- Outer -->
  <polygon points="335,75 590,280 335,485 80,280" fill="none" stroke="#777" stroke-width="2"/>
  <!-- Middle -->
  <polygon points="335,108 557,280 335,452 113,280" fill="none" stroke="#777" stroke-width="2"/>
  <!-- Inner -->
  <polygon points="335,141 524,280 335,419 146,280" fill="none" stroke="#777" stroke-width="2"/>
  <!-- Text: RoCoWo — large, spanning full width, baseline ~430 -->
  <text font-family="'Raleway', sans-serif" font-weight="400" fill="#F2F2F2" text-anchor="middle" x="335" y="445">
    <tspan font-size="155" dy="0">R</tspan><tspan font-size="105" dy="18" baseline-shift="-8">o</tspan><tspan font-size="155" dy="-18">C</tspan><tspan font-size="105" dy="18" baseline-shift="-8">o</tspan><tspan font-size="155" dy="-18">W</tspan><tspan font-size="105" dy="18" baseline-shift="-8">o</tspan>
  </text>
</svg>

<div class="label">Light</div>
<svg width="670" height="670" viewBox="0 0 670 670" xmlns="http://www.w3.org/2000/svg">
  <rect width="670" height="670" fill="#FFFFFF"/>
  <polygon points="335,75 590,280 335,485 80,280" fill="none" stroke="#ccc" stroke-width="2"/>
  <polygon points="335,108 557,280 335,452 113,280" fill="none" stroke="#ccc" stroke-width="2"/>
  <polygon points="335,141 524,280 335,419 146,280" fill="none" stroke="#ccc" stroke-width="2"/>
  <text font-family="'Raleway', sans-serif" font-weight="400" fill="#111111" text-anchor="middle" x="335" y="445">
    <tspan font-size="155" dy="0">R</tspan><tspan font-size="105" dy="18">o</tspan><tspan font-size="155" dy="-18">C</tspan><tspan font-size="105" dy="18">o</tspan><tspan font-size="155" dy="-18">W</tspan><tspan font-size="105" dy="18">o</tspan>
  </text>
</svg>

</body>
</html>
